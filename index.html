<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Учёт товаров на полках — Supabase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      body {
        font-family: system-ui, sans-serif;
      }
      .modal {
        animation: modalPop 0.3s ease;
      }
      @keyframes modalPop {
        from {
          transform: scale(0.95);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      img:hover {
        transform: scale(1.08);
      }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen pb-12">
    <div class="max-w-5xl mx-auto px-4 py-6">
      <div
        class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8"
      >
        <h1 class="text-3xl font-bold text-gray-800">
          📦 Учёт товаров на полках (Supabase)
        </h1>
        <div class="flex flex-wrap gap-3">
          <button
            id="loginBtn"
            onclick="showLogin()"
            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-2xl font-medium"
          >
            👤 Войти как админ
          </button>
          <button
            id="logoutBtn"
            onclick="logout()"
            class="hidden bg-red-500 hover:bg-red-600 text-white px-6 py-2.5 rounded-2xl font-medium"
          >
            Выйти
          </button>
          <button
            onclick="exportToExcel()"
            class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2.5 rounded-2xl font-medium"
          >
            📊 Экспорт в Excel
          </button>
        </div>
      </div>

      <!-- Поиск и фильтр -->
      <div class="flex flex-col md:flex-row gap-4 mb-6">
        <input
          id="searchInput"
          onkeyup="filterTable()"
          placeholder="🔍 Поиск по названию..."
          class="flex-1 px-5 py-4 border border-gray-300 rounded-3xl focus:outline-none focus:border-blue-500 text-lg"
        />
        <select
          id="shelfFilter"
          onchange="filterTable()"
          class="w-full md:w-64 px-5 py-4 border border-gray-300 rounded-3xl focus:outline-none focus:border-blue-500 text-lg bg-white"
        >
          <option value="">Все полки</option>
        </select>
      </div>

      <!-- Таблица -->
      <div class="bg-white rounded-3xl shadow overflow-hidden">
        <table class="w-full">
          <thead class="bg-gray-100">
            <tr>
              <th class="px-6 py-4 text-left">Фото</th>
              <th class="px-6 py-4 text-left">Товар</th>
              <th class="px-6 py-4 text-left">Полка</th>
              <th class="px-6 py-4 text-center">Количество</th>
              <th id="actionsHeader" class="px-6 py-4 text-right hidden w-28">
                Действия
              </th>
            </tr>
          </thead>
          <tbody id="productsTable" class="divide-y"></tbody>
        </table>
      </div>

      <button
        id="addBtn"
        onclick="showAddModal()"
        class="hidden mt-8 bg-green-600 hover:bg-green-700 text-white px-10 py-4 rounded-3xl text-lg font-semibold mx-auto block"
      >
        ➕ Добавить новый товар
      </button>
    </div>

    <!-- Модалы (логин и редактирование) — такие же как раньше -->
    <div
      id="loginModal"
      class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50"
    >
      <div class="modal bg-white rounded-3xl p-8 w-full max-w-sm mx-4">
        <h2 class="text-2xl font-bold mb-6">Вход для админа</h2>
        <input
          id="email"
          type="email"
          placeholder="Email"
          class="w-full px-5 py-4 border rounded-2xl mb-4 text-lg"
        />
        <input
          id="password"
          type="password"
          placeholder="Пароль"
          class="w-full px-5 py-4 border rounded-2xl mb-6 text-lg"
        />
        <div class="flex gap-3">
          <button onclick="hideLogin()" class="flex-1 py-4 text-gray-500">
            Отмена
          </button>
          <button
            onclick="login()"
            class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-semibold"
          >
            Войти
          </button>
        </div>
      </div>
    </div>

    <div
      id="editModal"
      class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50"
    >
      <div class="modal bg-white rounded-3xl p-8 w-full max-w-md mx-4">
        <h2 id="modalTitle" class="text-2xl font-bold mb-6">
          Редактировать товар
        </h2>
        <input
          id="prodName"
          placeholder="Название товара"
          class="w-full px-5 py-4 border rounded-2xl mb-4"
        />
        <input
          id="prodShelf"
          placeholder="Полка"
          class="w-full px-5 py-4 border rounded-2xl mb-4"
        />
        <input
          id="prodQty"
          type="number"
          placeholder="Количество"
          class="w-full px-5 py-4 border rounded-2xl mb-4"
        />
        <input
          id="prodImage"
          placeholder="Ссылка на фото (https://...)"
          class="w-full px-5 py-4 border rounded-2xl mb-6"
        />
        <div class="flex gap-3">
          <button onclick="hideEditModal()" class="flex-1 py-4 text-gray-500">
            Отмена
          </button>
          <button
            id="saveBtn"
            onclick="saveProduct()"
            class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-semibold"
          >
            Сохранить
          </button>
        </div>
        <button
          id="deleteBtn"
          onclick="deleteProduct()"
          class="hidden mt-4 text-red-600 w-full py-3"
        >
          🗑 Удалить
        </button>
      </div>
    </div>

    <script>
      // ================== SUPABASE CONFIG ==================
      const SUPABASE_URL = "https://thkdfpzhtvtuvihbrdri.supabase.co"; // ← Замени
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoa2RmcHpodHZ0dXZpaGJyZHJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzAzODIsImV4cCI6MjA5MDAwNjM4Mn0.U-2MY8f_IjU7D5YeO-zLVHW-VP9S3W_DGFsHNJNv8rc"; // ← Замени

      const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      let currentUser = null;
      let currentEditId = null;
      let allProducts = [];

      // Загрузка и реал-тайм подписка
      async function loadProducts() {
        const { data, error } = await supabase
          .from("products")
          .select("*")
          .order("name");
        if (error) console.error(error);
        else renderProducts(data || []);

        // Реал-тайм подписка
        supabase
          .channel("products-changes")
          .on(
            "postgres_changes",
            { event: "*", schema: "public", table: "products" },
            (payload) => {
              loadProducts(); // перезагружаем весь список при любом изменении
            },
          )
          .subscribe();
      }

      function renderProducts(products) {
        allProducts = products;
        const tbody = document.getElementById("productsTable");
        tbody.innerHTML = "";

        if (products.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" class="text-center py-12 text-gray-400">Товары не найдены</td></tr>`;
          return;
        }

        products.forEach((p) => {
          const tr = document.createElement("tr");
          tr.className = "hover:bg-gray-50";
          tr.innerHTML = `
      <td class="px-6 py-5">
        ${
          p.image
            ? `<img src="${p.image}" onclick="showImage('${p.image}')" class="w-14 h-14 object-cover rounded-2xl cursor-pointer border">`
            : `<div class="w-14 h-14 bg-gray-200 rounded-2xl flex items-center justify-center text-3xl">📦</div>`
        }
      </td>
      <td class="px-6 py-5 font-medium">${p.name}</td>
      <td class="px-6 py-5 text-gray-600">${p.shelf}</td>
      <td class="px-6 py-5 text-center font-semibold text-2xl">${p.quantity}</td>
      <td class="px-6 py-5 text-right admin-only">
        <button onclick="editProduct('${p.id}', '${p.name}', '${p.shelf}', ${p.quantity}, '${p.image || ""}')" 
                class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-5 py-2 rounded-2xl text-sm">✏️</button>
      </td>
    `;
          tbody.appendChild(tr);
        });

        updateShelfFilter();
      }

      function updateShelfFilter() {
        const shelves = [...new Set(allProducts.map((p) => p.shelf))].sort();
        const select = document.getElementById("shelfFilter");
        select.innerHTML = '<option value="">Все полки</option>';
        shelves.forEach((s) => {
          const opt = document.createElement("option");
          opt.value = s;
          opt.textContent = s;
          select.appendChild(opt);
        });
      }

      function filterTable() {
        const search = document
          .getElementById("searchInput")
          .value.toLowerCase()
          .trim();
        const shelf = document.getElementById("shelfFilter").value;

        const filtered = allProducts.filter((p) => {
          const matchName = !search || p.name.toLowerCase().includes(search);
          const matchShelf = !shelf || p.shelf === shelf;
          return matchName && matchShelf;
        });

        renderProducts(filtered);
      }

      // Экспорт в Excel
      function exportToExcel() {
        if (allProducts.length === 0) return alert("Нет данных");
        const data = allProducts.map((p) => ({
          Название: p.name,
          Полка: p.shelf,
          Количество: p.quantity,
          Фото: p.image || "",
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Товары");
        XLSX.writeFile(
          wb,
          `Учёт_товаров_${new Date().toISOString().slice(0, 10)}.xlsx`,
        );
      }

      function showImage(src) {
        const div = document.createElement("div");
        div.className =
          "fixed inset-0 bg-black/90 flex items-center justify-center z-[100]";
        div.innerHTML = `<img src="${src}" class="max-h-[90vh] rounded-3xl" onclick="this.parentElement.remove()">`;
        document.body.appendChild(div);
      }

      // Авторизация
      async function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const { error } = await supabase.auth.signInWithPassword({
          email,
          password,
        });
        if (error) alert("Ошибка: " + error.message);
        else hideLogin();
      }

      function logout() {
        supabase.auth.signOut();
      }
      function showLogin() {
        document.getElementById("loginModal").classList.remove("hidden");
      }
      function hideLogin() {
        document.getElementById("loginModal").classList.add("hidden");
      }

      function checkAuth() {
        supabase.auth.onAuthStateChange((event, session) => {
          currentUser = session?.user || null;
          const isAdmin = !!currentUser;

          document
            .getElementById("loginBtn")
            .classList.toggle("hidden", isAdmin);
          document
            .getElementById("logoutBtn")
            .classList.toggle("hidden", !isAdmin);
          document
            .getElementById("addBtn")
            .classList.toggle("hidden", !isAdmin);
          document
            .getElementById("actionsHeader")
            .classList.toggle("hidden", !isAdmin);
          document
            .querySelectorAll(".admin-only")
            .forEach(
              (el) => (el.style.display = isAdmin ? "table-cell" : "none"),
            );
        });
      }

      // Добавление / редактирование / удаление
      let editingId = null;

      function showAddModal() {
        editingId = null;
        document.getElementById("modalTitle").textContent = "Новый товар";
        document.getElementById("prodName").value = "";
        document.getElementById("prodShelf").value = "";
        document.getElementById("prodQty").value = "0";
        document.getElementById("prodImage").value = "";
        document.getElementById("deleteBtn").classList.add("hidden");
        document.getElementById("editModal").classList.remove("hidden");
      }

      function editProduct(id, name, shelf, qty, image = "") {
        editingId = id;
        document.getElementById("modalTitle").textContent =
          "Редактировать товар";
        document.getElementById("prodName").value = name;
        document.getElementById("prodShelf").value = shelf;
        document.getElementById("prodQty").value = qty;
        document.getElementById("prodImage").value = image || "";
        document.getElementById("deleteBtn").classList.remove("hidden");
        document.getElementById("editModal").classList.remove("hidden");
      }

      function hideEditModal() {
        document.getElementById("editModal").classList.add("hidden");
      }

      async function saveProduct() {
        const name = document.getElementById("prodName").value.trim();
        const shelf = document.getElementById("prodShelf").value.trim();
        const quantity =
          parseInt(document.getElementById("prodQty").value) || 0;
        const image = document.getElementById("prodImage").value.trim();

        if (!name || !shelf) return alert("Название и полка обязательны");

        const data = { name, shelf, quantity, image: image || null };

        let error;
        if (editingId) {
          ({ error } = await supabase
            .from("products")
            .update(data)
            .eq("id", editingId));
        } else {
          ({ error } = await supabase.from("products").insert(data));
        }

        if (error) alert("Ошибка: " + error.message);
        else hideEditModal();
      }

      async function deleteProduct() {
        if (!confirm("Удалить товар навсегда?")) return;
        const { error } = await supabase
          .from("products")
          .delete()
          .eq("id", editingId);
        if (error) alert(error.message);
        else hideEditModal();
      }

      // Запуск
      window.onload = () => {
        checkAuth();
        loadProducts();
      };
    </script>
  </body>
</html>
