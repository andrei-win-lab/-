
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Учёт товаров на полках</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-app-compat.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-auth-compat.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-database-compat.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .modal { animation: modalPop 0.3s ease; }
    @keyframes modalPop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    img { transition: all 0.2s; }
    img:hover { transform: scale(1.05); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen pb-12">

  <div class="max-w-5xl mx-auto px-4 py-6">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
      <h1 class="text-3xl font-bold text-gray-800">📦 Учёт товаров на полках</h1>
      
      <div class="flex flex-wrap gap-3">
        <button id="loginBtn" onclick="showLogin()" 
                class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-2xl font-medium flex items-center gap-2">
          👤 Войти как админ
        </button>
        <button id="logoutBtn" onclick="logout()" class="hidden bg-red-500 hover:bg-red-600 text-white px-6 py-2.5 rounded-2xl font-medium">
          Выйти
        </button>
        <button onclick="exportToExcel()" 
                class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2.5 rounded-2xl font-medium flex items-center gap-2">
          📊 Экспорт в Excel
        </button>
      </div>
    </div>

    <!-- Поиск и фильтр -->
    <div class="flex flex-col md:flex-row gap-4 mb-6">
      <div class="flex-1">
        <input id="searchInput" 
               onkeyup="filterTable()" 
               type="text" 
               placeholder="🔍 Поиск по названию товара..." 
               class="w-full px-5 py-4 border border-gray-300 rounded-3xl focus:outline-none focus:border-blue-500 text-lg">
      </div>
      <div class="w-full md:w-64">
        <select id="shelfFilter" onchange="filterTable()" 
                class="w-full px-5 py-4 border border-gray-300 rounded-3xl focus:outline-none focus:border-blue-500 text-lg bg-white">
          <option value="">Все полки</option>
        </select>
      </div>
    </div>

    <!-- Таблица -->
    <div class="bg-white rounded-3xl shadow overflow-hidden">
      <table class="w-full">
        <thead class="bg-gray-100">
          <tr>
            <th class="px-6 py-4 text-left">Фото</th>
            <th class="px-6 py-4 text-left">Товар</th>
            <th class="px-6 py-4 text-left">Полка</th>
            <th class="px-6 py-4 text-center">Количество</th>
            <th id="actionsHeader" class="px-6 py-4 text-right hidden w-28">Действия</th>
          </tr>
        </thead>
        <tbody id="productsTable" class="divide-y"></tbody>
      </table>
    </div>

    <!-- Кнопка добавить (только админ) -->
    <button id="addBtn" onclick="showAddModal()" 
            class="hidden mt-8 bg-green-600 hover:bg-green-700 text-white px-10 py-4 rounded-3xl text-lg font-semibold mx-auto block flex items-center gap-3 shadow-lg">
      ➕ Добавить новый товар
    </button>
  </div>

  <!-- Модал входа -->
  <div id="loginModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="modal bg-white rounded-3xl p-8 w-full max-w-sm mx-4">
      <h2 class="text-2xl font-bold mb-6">Вход для админа</h2>
      <input id="email" type="email" placeholder="Email" class="w-full px-5 py-4 border rounded-2xl mb-4 text-lg">
      <input id="password" type="password" placeholder="Пароль" class="w-full px-5 py-4 border rounded-2xl mb-6 text-lg">
      <div class="flex gap-3">
        <button onclick="hideLogin()" class="flex-1 py-4 text-gray-500 font-medium">Отмена</button>
        <button onclick="login()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-semibold">Войти</button>
      </div>
    </div>
  </div>

  <!-- Модал редактирования -->
  <div id="editModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="modal bg-white rounded-3xl p-8 w-full max-w-md mx-4">
      <h2 id="modalTitle" class="text-2xl font-bold mb-6">Редактировать товар</h2>
      
      <input id="prodName" placeholder="Название товара" class="w-full px-5 py-4 border rounded-2xl mb-4">
      <input id="prodShelf" placeholder="Полка (например A-12)" class="w-full px-5 py-4 border rounded-2xl mb-4">
      <input id="prodQty" type="number" placeholder="Количество" class="w-full px-5 py-4 border rounded-2xl mb-4">
      <input id="prodImage" placeholder="Ссылка на фото (https://...)" class="w-full px-5 py-4 border rounded-2xl mb-6">

      <div class="flex gap-3">
        <button onclick="hideEditModal()" class="flex-1 py-4 text-gray-500 font-medium">Отмена</button>
        <button id="saveBtn" onclick="saveProduct()" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-semibold">Сохранить</button>
      </div>
      <button id="deleteBtn" onclick="deleteProduct()" 
              class="hidden mt-4 text-red-600 hover:text-red-700 font-medium w-full py-3">🗑 Удалить товар</button>
    </div>
  </div>

<script>
// ================== ТВОЙ FIREBASE CONFIG ==================
const firebaseConfig = {
  apiKey: "ТВОЙ_API_KEY",
  authDomain: "твой-проект.firebaseapp.com",
  databaseURL: "https://твой-проект-default-rtdb.firebaseio.com",
  projectId: "твой-проект",
  storageBucket: "твой-проект.appspot.com",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:xxxxxxxxxxxxxxxx"
};
// ========================================================

let app, auth, db;
let currentUser = null;
let currentEditId = null;
let allProducts = [];   // для фильтрации и экспорта

function initFirebase() {
  app = firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
  db = firebase.database();
}

function renderProducts(products) {
  allProducts = products; // сохраняем для фильтров и экспорта
  const tbody = document.getElementById('productsTable');
  tbody.innerHTML = '';

  if (products.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-12 text-gray-400">Товары не найдены</td></tr>`;
    return;
  }

  products.forEach(p => {
    const tr = document.createElement('tr');
    tr.className = 'hover:bg-gray-50 transition';
    tr.innerHTML = `
      <td class="px-6 py-5">
        ${p.image ? 
          `<img src="${p.image}" onclick="showImage('${p.image}')" class="w-14 h-14 object-cover rounded-2xl cursor-pointer border" alt="${p.name}">` : 
          `<div class="w-14 h-14 bg-gray-200 rounded-2xl flex items-center justify-center text-3xl">📦</div>`}
      </td>
      <td class="px-6 py-5 font-medium">${p.name}</td>
      <td class="px-6 py-5 text-gray-600">${p.shelf}</td>
      <td class="px-6 py-5 text-center font-semibold text-2xl">${p.quantity}</td>
      <td class="px-6 py-5 text-right admin-only">
        <button onclick="editProduct('${p.id}', '${p.name}', '${p.shelf}', ${p.quantity}, '${p.image || ''}')" 
                class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-5 py-2 rounded-2xl text-sm font-medium">
          ✏️
        </button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function loadProducts() {
  db.ref('products').on('value', snapshot => {
    const products = [];
    const shelves = new Set();

    snapshot.forEach(child => {
      const data = child.val();
      data.id = child.key;
      products.push(data);
      if (data.shelf) shelves.add(data.shelf);
    });

    // Обновляем фильтр по полкам
    const select = document.getElementById('shelfFilter');
    select.innerHTML = '<option value="">Все полки</option>';
    Array.from(shelves).sort().forEach(s => {
      const opt = document.createElement('option');
      opt.value = s;
      opt.textContent = s;
      select.appendChild(opt);
    });

    renderProducts(products);
  });
}

function filterTable() {
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const shelfFilter = document.getElementById('shelfFilter').value;

  const filtered = allProducts.filter(p => {
    const matchSearch = !search || p.name.toLowerCase().includes(search);
    const matchShelf = !shelfFilter || p.shelf === shelfFilter;
    return matchSearch && matchShelf;
  });

  renderProducts(filtered);
}

// Экспорт в Excel
function exportToExcel() {
  if (allProducts.length === 0) {
    alert('Нет данных для экспорта');
    return;
  }

  const data = allProducts.map(p => ({
    'Название': p.name,
    'Полка': p.shelf,
    'Количество': p.quantity,
    'Фото': p.image || ''
  }));

  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Товары");

  XLSX.writeFile(wb, `Учёт_на_полках_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// Показать большое фото
function showImage(src) {
  const modal = document.createElement('div');
  modal.className = 'fixed inset-0 bg-black/90 flex items-center justify-center z-[100]';
  modal.innerHTML = `
    <div class="relative max-w-4xl mx-4">
      <button onclick="this.parentElement.parentElement.remove()" 
              class="absolute -top-4 -right-4 bg-white text-black w-10 h-10 rounded-full flex items-center justify-center text-2xl shadow">✕</button>
      <img src="${src}" class="max-h-[85vh] rounded-3xl" alt="Фото товара">
    </div>
  `;
  document.body.appendChild(modal);
}

// Авторизация и остальной код (login, logout, checkAuth, модалы) — почти без изменений
function showLogin() { document.getElementById('loginModal').classList.remove('hidden'); }
function hideLogin() { document.getElementById('loginModal').classList.add('hidden'); }

async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  try {
    await auth.signInWithEmailAndPassword(email, password);
    hideLogin();
  } catch (e) {
    alert('Ошибка: ' + e.message);
  }
}

function logout() { auth.signOut(); }

function checkAuth() {
  auth.onAuthStateChanged(user => {
    currentUser = user;
    const isAdmin = !!user;
    
    document.getElementById('loginBtn').classList.toggle('hidden', isAdmin);
    document.getElementById('logoutBtn').classList.toggle('hidden', !isAdmin);
    document.getElementById('addBtn').classList.toggle('hidden', !isAdmin);
    document.getElementById('actionsHeader').classList.toggle('hidden', !isAdmin);
    
    document.querySelectorAll('.admin-only').forEach(el => {
      el.style.display = isAdmin ? 'table-cell' : 'none';
    });
  });
}

// Добавление / редактирование
function showAddModal() {
  currentEditId = null;
  document.getElementById('modalTitle').textContent = 'Новый товар';
  document.getElementById('prodName').value = '';
  document.getElementById('prodShelf').value = '';
  document.getElementById('prodQty').value = '0';
  document.getElementById('prodImage').value = '';
  document.getElementById('deleteBtn').classList.add('hidden');
  document.getElementById('editModal').classList.remove('hidden');
}

function editProduct(id, name, shelf, qty, image = '') {
  currentEditId = id;
  document.getElementById('modalTitle').textContent = 'Редактировать товар';
  document.getElementById('prodName').value = name;
  document.getElementById('prodShelf').value = shelf;
  document.getElementById('prodQty').value = qty;
  document.getElementById('prodImage').value = image || '';
  document.getElementById('deleteBtn').classList.remove('hidden');
  document.getElementById('editModal').classList.remove('hidden');
}

function hideEditModal() {
  document.getElementById('editModal').classList.add('hidden');
}

async function saveProduct() {
  const name = document.getElementById('prodName').value.trim();
  const shelf = document.getElementById('prodShelf').value.trim();
  const quantity = parseInt(document.getElementById('prodQty').value) || 0;
  const image = document.getElementById('prodImage').value.trim();

  if (!name || !shelf) {
    alert('Название и полка обязательны');
    return;
  }

  const data = { name, shelf, quantity, image: image || null };

  if (currentEditId) {
    await db.ref('products/' + currentEditId).update(data);
  } else {
    await db.ref('products').push(data);
  }
  hideEditModal();
}

async function deleteProduct() {
  if (confirm('Удалить товар навсегда?')) {
    await db.ref('products/' + currentEditId).remove();
    hideEditModal();
  }
}

// Инициализация
window.onload = () => {
  initFirebase();
  loadProducts();
  checkAuth();
};
</script>
</body>
</html>
