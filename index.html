<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Учёт товаров на полках</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      body {
        font-family: system-ui, sans-serif;
      }
      .modal {
        animation: modalPop 0.3s ease;
      }
      @keyframes modalPop {
        from {
          transform: scale(0.95);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen pb-12">
    <div class="max-w-5xl mx-auto px-4 py-6">
      <div
        class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8"
      >
        <h1 class="text-3xl font-bold text-gray-800">📦 Учёт товаров</h1>
        <div class="flex flex-wrap gap-3">
          <button
            id="loginBtn"
            onclick="showModal('loginModal')"
            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-2xl font-medium"
          >
            👤 Войти
          </button>
          <button
            id="logoutBtn"
            onclick="logout()"
            class="hidden bg-red-500 hover:bg-red-600 text-white px-6 py-2.5 rounded-2xl font-medium"
          >
            Выйти
          </button>
          <button
            onclick="exportToExcel()"
            class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2.5 rounded-2xl font-medium"
          >
            📊 Excel
          </button>
        </div>
      </div>

      <div class="flex flex-col md:flex-row gap-4 mb-6">
        <input
          id="searchInput"
          oninput="filterTable()"
          placeholder="🔍 Поиск товара..."
          class="flex-1 px-5 py-4 border border-gray-300 rounded-3xl focus:outline-none focus:border-blue-500 text-lg"
        />
        <select
          id="shelfFilter"
          onchange="filterTable()"
          class="w-full md:w-64 px-5 py-4 border border-gray-300 rounded-3xl bg-white text-lg"
        >
          <option value="">Все полки</option>
        </select>
      </div>

      <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-6 py-4 text-left text-gray-500 font-medium">
                  Фото
                </th>
                <th class="px-6 py-4 text-left text-gray-500 font-medium">
                  Название
                </th>
                <th class="px-6 py-4 text-left text-gray-500 font-medium">
                  Полка
                </th>
                <th class="px-6 py-4 text-center text-gray-500 font-medium">
                  Кол-во
                </th>
                <th
                  id="actionsHeader"
                  class="px-6 py-4 text-right text-gray-500 font-medium hidden"
                >
                  Действия
                </th>
              </tr>
            </thead>
            <tbody id="productsTable" class="divide-y divide-gray-100"></tbody>
          </table>
        </div>
      </div>

      <button
        id="addBtn"
        onclick="showAddModal()"
        class="hidden mt-8 bg-green-600 hover:bg-green-700 text-white px-10 py-4 rounded-3xl text-lg font-semibold mx-auto block shadow-lg"
      >
        ➕ Добавить товар
      </button>
    </div>

    <div
      id="loginModal"
      class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4"
    >
      <div class="modal bg-white rounded-3xl p-8 w-full max-w-sm">
        <h2 class="text-2xl font-bold mb-6">Вход админа</h2>
        <input
          id="email"
          type="email"
          placeholder="Email"
          class="w-full px-5 py-4 border rounded-2xl mb-4"
        />
        <input
          id="password"
          type="password"
          placeholder="Пароль"
          class="w-full px-5 py-4 border rounded-2xl mb-6"
        />
        <div class="flex gap-3">
          <button
            onclick="hideModal('loginModal')"
            class="flex-1 py-4 text-gray-400"
          >
            Отмена
          </button>
          <button
            onclick="login()"
            class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold"
          >
            Войти
          </button>
        </div>
      </div>
    </div>

    <div
      id="editModal"
      class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4"
    >
      <div class="modal bg-white rounded-3xl p-8 w-full max-w-md">
        <h2 id="modalTitle" class="text-2xl font-bold mb-6">Товар</h2>
        <div class="space-y-4">
          <input
            id="prodName"
            placeholder="Название"
            class="w-full px-5 py-4 border rounded-2xl"
          />
          <input
            id="prodShelf"
            placeholder="Полка"
            class="w-full px-5 py-4 border rounded-2xl"
          />
          <input
            id="prodQty"
            type="number"
            placeholder="Количество"
            class="w-full px-5 py-4 border rounded-2xl"
          />
          <input
            id="prodImage"
            placeholder="URL картинки"
            class="w-full px-5 py-4 border rounded-2xl"
          />
        </div>
        <div class="flex gap-3 mt-8">
          <button
            onclick="hideModal('editModal')"
            class="flex-1 py-4 text-gray-400"
          >
            Отмена
          </button>
          <button
            onclick="saveProduct()"
            class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-bold"
          >
            Сохранить
          </button>
        </div>
        <button
          id="deleteBtn"
          onclick="deleteProduct()"
          class="w-full mt-4 text-red-500 text-sm font-medium"
        >
          Удалить товар
        </button>
      </div>
    </div>

    <script>
      // Конфигурация
      const SUPABASE_URL = "https://thkdfpzhtvtuvihbrdri.supabase.co";
      const SUPABASE_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoa2RmcHpodHZ0dXZpaGJyZHJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzAzODIsImV4cCI6MjA5MDAwNjM4Mn0.U-2MY8f_IjU7D5YeO-zLVHW-VP9S3W_DGFsHNJNv8rc";

      const { createClient } = supabase;
      const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

      let allProducts = [];
      let editingId = null;

      // Инициализация
      window.onload = async () => {
        checkAuth();
        await loadProducts();
      };

      async function checkAuth() {
        const {
          data: { session },
        } = await _supabase.auth.getSession();
        updateUI(session);

        _supabase.auth.onAuthStateChange((_event, session) => {
          updateUI(session);
          loadProducts();
        });
      }

      function updateUI(session) {
        const isAuth = !!session;
        document.getElementById("loginBtn").classList.toggle("hidden", isAuth);
        document
          .getElementById("logoutBtn")
          .classList.toggle("hidden", !isAuth);
        document.getElementById("addBtn").classList.toggle("hidden", !isAuth);
        document
          .getElementById("actionsHeader")
          .classList.toggle("hidden", !isAuth);
      }

      // Работа с данными
      async function loadProducts() {
        const { data, error } = await _supabase
          .from("products")
          .select("*")
          .order("name");
        if (error) return console.error("Ошибка загрузки:", error.message);
        allProducts = data || [];
        renderProducts(allProducts);
        updateShelfFilter();
      }

      function renderProducts(products) {
        const tbody = document.getElementById("productsTable");
        const isAuth = document
          .getElementById("loginBtn")
          .classList.contains("hidden");

        tbody.innerHTML =
          products.length === 0
            ? `<tr><td colspan="5" class="py-12 text-center text-gray-400">Товаров не найдено</td></tr>`
            : "";

        products.forEach((p) => {
          const tr = document.createElement("tr");
          tr.className = "hover:bg-gray-50 transition-colors";
          tr.innerHTML = `
            <td class="px-6 py-4">${p.image ? `<img src="${p.image}" onclick="zoomImage('${p.image}')" class="w-12 h-12 object-cover rounded-xl cursor-pointer hover:scale-110 transition">` : '<div class="w-12 h-12 bg-gray-100 rounded-xl flex items-center justify-center text-xl">📦</div>'}</td>
            <td class="px-6 py-4 font-semibold text-gray-800">${p.name}</td>
            <td class="px-6 py-4 text-gray-500">${p.shelf}</td>
            <td class="px-6 py-4 text-center text-2xl font-bold text-blue-600">${p.quantity}</td>
            <td class="px-6 py-4 text-right ${isAuth ? "" : "hidden"}">
              <button onclick="showEditModal('${p.id}')" class="bg-gray-100 hover:bg-blue-100 p-3 rounded-xl transition">✏️</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      // Функции модалок
      function showModal(id) {
        document.getElementById(id).classList.remove("hidden");
      }
      function hideModal(id) {
        document.getElementById(id).classList.add("hidden");
      }

      function showAddModal() {
        editingId = null;
        document.getElementById("modalTitle").textContent = "➕ Новый товар";
        document.getElementById("prodName").value = "";
        document.getElementById("prodShelf").value = "";
        document.getElementById("prodQty").value = "0";
        document.getElementById("prodImage").value = "";
        document.getElementById("deleteBtn").classList.add("hidden");
        showModal("editModal");
      }

      function showEditModal(id) {
        const p = allProducts.find((x) => x.id === id);
        if (!p) return;
        editingId = id;
        document.getElementById("modalTitle").textContent = "✏️ Редактирование";
        document.getElementById("prodName").value = p.name;
        document.getElementById("prodShelf").value = p.shelf;
        document.getElementById("prodQty").value = p.quantity;
        document.getElementById("prodImage").value = p.image || "";
        document.getElementById("deleteBtn").classList.remove("hidden");
        showModal("editModal");
      }

      // CRUD операции
      async function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const { error } = await _supabase.auth.signInWithPassword({
          email,
          password,
        });
        if (error) alert("Ошибка входа: " + error.message);
        else hideModal("loginModal");
      }

      async function logout() {
        await _supabase.auth.signOut();
      }

      async function saveProduct() {
        const payload = {
          name: document.getElementById("prodName").value.trim(),
          shelf: document.getElementById("prodShelf").value.trim(),
          quantity: parseInt(document.getElementById("prodQty").value) || 0,
          image: document.getElementById("prodImage").value.trim() || null,
        };

        if (!payload.name || !payload.shelf)
          return alert("Заполните Название и Полку!");

        const { error } = editingId
          ? await _supabase.from("products").update(payload).eq("id", editingId)
          : await _supabase.from("products").insert([payload]);

        if (error) alert(error.message);
        else {
          hideModal("editModal");
          loadProducts();
        }
      }

      async function deleteProduct() {
        if (!confirm("Удалить этот товар?")) return;
        const { error } = await _supabase
          .from("products")
          .delete()
          .eq("id", editingId);
        if (error) alert(error.message);
        else {
          hideModal("editModal");
          loadProducts();
        }
      }

      // Фильтры и экспорт
      function filterTable() {
        const query = document
          .getElementById("searchInput")
          .value.toLowerCase();
        const shelf = document.getElementById("shelfFilter").value;
        const filtered = allProducts.filter(
          (p) =>
            p.name.toLowerCase().includes(query) &&
            (!shelf || p.shelf === shelf),
        );
        renderProducts(filtered);
      }

      function updateShelfFilter() {
        const select = document.getElementById("shelfFilter");
        const current = select.value;
        const shelves = [...new Set(allProducts.map((p) => p.shelf))].sort();
        select.innerHTML = '<option value="">Все полки</option>';
        shelves.forEach((s) => {
          const opt = document.createElement("option");
          opt.value = s;
          opt.textContent = s;
          select.appendChild(opt);
        });
        select.value = current;
      }

      function exportToExcel() {
        const ws = XLSX.utils.json_to_sheet(
          allProducts.map((p) => ({
            Название: p.name,
            Полка: p.shelf,
            "Кол-во": p.quantity,
            Фото: p.image,
          })),
        );
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Склад");
        XLSX.writeFile(wb, `Склад_${new Date().toLocaleDateString()}.xlsx`);
      }

      function zoomImage(src) {
        const div = document.createElement("div");
        div.className =
          "fixed inset-0 bg-black/90 flex items-center justify-center z-[100] p-4 cursor-pointer";
        div.innerHTML = `<img src="${src}" class="max-h-full rounded-2xl shadow-2xl">`;
        div.onclick = () => div.remove();
        document.body.appendChild(div);
      }
    </script>
  </body>
</html>
